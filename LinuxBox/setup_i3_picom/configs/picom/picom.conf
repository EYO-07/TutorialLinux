# BEGIN : picom.conf
# -- Backend Settings --
# 1. GLX backend is typically faster, but "egl" is a modern alternative 
backend = "glx" ; # glx, egl, xrender, xr_glx_hybrid 
vsync = true;
use-damage = true;  

# -- Opacity Settings --
# 1. use `xprop WM_CLASS` to get window class name
# 2. use opacity-rule to exclude windows from global opacity
# ... for example, video players, browsers.
active-opacity = 0.87;
inactive-opacity = 0.65;
inactive-opacity-override = false; # keep global inactive opacity
frame-opacity = 0.9;
detect-client-opacity = true;
opacity-rule = [
    "100:class_g = 'Firefox'",
    "100:class_g = 'Brave'",
    "100:class_g = 'Brave-browser'",
	"100:class_g = 'vlc'",
    "75:class_g = 'Evince'",
];

# -- Fading Settings --
fading = true;
fade-delta = 10; # The time between steps in a fade in milliseconds.
fade-in-step = 0.03;
fade-out-step = 0.03;

# -- Blur Settings -- 
# 1. dual_kawase is not available on older versions 
# 2. use kernel for legacy hardware
blur-method = "kernel"; # "kernel", "dual_kawase"
# blur-kern = "3x3box"; # para dual_kawase
blur-strength = 3;
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;
blur-background-exclude = [];

# -- Shadows Settings -- 
shadow = true;
shadow-radius = 7;
shadow-opacity = .75; # Range: 0.0 - 1.0
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-color = "#000000";

# -- Misc --
# max-brightness = 1.0 # Dimming bright windows so their brightness doesn't exceed this set value.
# xrender-sync-fence = false # Required for explicit sync drivers, such as nvidia.

# END 

