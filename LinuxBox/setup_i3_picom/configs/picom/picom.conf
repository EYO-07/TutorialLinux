# --- Backend Settings ---
# GLX backend is typically faster, but "egl" is a modern alternative 
# if you encounter flickering on newer Intel/AMD drivers.

# --- 
backend = "glx" ; # glx, egl, xrender, xr_glx_hybrid // backend de renderização.
vsync = true;
use-damage = false;  

# --- Opacity ---
active-opacity = 1.0;           # Keep active windows fully opaque for focus
inactive-opacity = 1.0;        # 0.60 is usually too transparent for productivity
#frame-opacity = 1.0;
frame-opacity = 0

# --- Window Specific Opacity ---
# Syntax: "percentage:class_g = 'ClassName'"
# xprop WM_CLASS for the name of 
opacity-rule = [
	"85:class_g='UXTerm' && focused",
    "75:class_g='UXTerm' && !focused",
    "85:class_g='XTerm' && focused",
    "75:class_g='XTerm' && !focused",
    "82:class_g='Geany' && focused",
    "75:class_g='Geany' && !focused",
    "88:class_g='Notepad--' && focused",
    "60:class_g='Notepad--' && !focused",
    "88:class_g='Notepad-- ROOT' && focused",
    "60:class_g='Notepad-- ROOT' && !focused",
	"90:class_g='Scite' && focused",
    "75:class_g='Scite' && !focused",
	"90:class_g='Thunar' && focused",
    "85:class_g='Thunar' && !focused",
    "90:class_g='Lxappearance' && focused",
    "85:class_g='Lxappearance' && !focused",
];

# --- Fading (Makes the UI feel smoother) ---
fading = true;
fade-delta = 4; # The time between steps in a fade in milliseconds.
fade-in-step = 0.03;
fade-out-step = 0.03;

# Enable blur
blur-method = "kernel"
blur-strength = 3

# Define which windows get blurred (usually the background behind transparent windows)
# This usually applies to the "backdrop" of transparent windows
blur-background = true
blur-background-frame = false
blur-background-fixed = true

# Exclude specific windows if needed (optional)
# blur-background-exclude = [ ... ]

# -- 
shadow = true
shadow-radius = 0
shadow-opacity = 0
shadow-offset-x = 0
shadow-offset-y = 0
corner-radius = 0 # Optional: disabling rounded corners can sometimes help rendering stability

